services:
  - type: web
    name: avtokanal-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -u main.py
    autoDeploy: true
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: TARGET_CHANNEL_ID
        sync: false
